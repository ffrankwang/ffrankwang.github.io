<script>
(function() {
  var photos = window.__GALLERY__;
  if (!photos || !photos.length) return;

  var html = '<div class="gallery-grid" id="gallery">';
  photos.forEach(function(p) {
    html += '<a href="' + p.src + '" data-sub-html="' + p.name + '">';
    html += '<img src="' + p.thumb + '" srcset="/img/loading.gif" lazyload alt="' + p.name + '">';
    html += '</a>';
  });
  html += '</div>';
  document.getElementById('gallery-container').innerHTML = html;

  lightGallery(document.getElementById('gallery'), {
    selector: 'a',
    speed: 450,
    mode: 'lg-slide',
    download: false,
    preload: 2,
    hideBarsDelay: 3000,
    thumbnail: false,
    zoom: false,
    slideShowAutoplay: false,
    enableDrag: true,
    swipeThreshold: 50
  });
})();
</script>
